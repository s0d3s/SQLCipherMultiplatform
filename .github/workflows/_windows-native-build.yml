name: _windows-native-build

"on":
  workflow_call:
    inputs:
      native-build-type:
        description: Native bridge build type
        required: false
        type: string
        default: Release
      native-lib-basename:
        description: Native JNI library basename (without platform prefix/suffix)
        required: false
        type: string
        default: sqlcipher_jni
      run-verify-samples:
        description: Run verifySamples task
        required: false
        type: boolean
        default: false
      run-native-smoke-test:
        description: Run native artifact guardrails (payload verification + shared jdbc-core integration tests)
        required: false
        type: boolean
        default: false
      run-publish-to-maven-local:
        description: Run publishToMavenLocal as a consumer smoke check
        required: false
        type: boolean
        default: false
      upload-artifacts:
        description: Upload built Windows native payload/JAR artifacts
        required: false
        type: boolean
        default: true
      artifact-prefix:
        description: Prefix used for uploaded artifact names
        required: false
        type: string
        default: windows-native

jobs:
  build:
    name: Windows build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install OpenSSL via vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "$env:GITHUB_WORKSPACE/third_party/vcpkg")) {
            git clone https://github.com/microsoft/vcpkg "$env:GITHUB_WORKSPACE/third_party/vcpkg"
          }
          & "$env:GITHUB_WORKSPACE/third_party/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          & "$env:GITHUB_WORKSPACE/third_party/vcpkg/vcpkg.exe" install openssl:x64-windows zlib:x64-windows
          "VCPKG_ROOT=$env:GITHUB_WORKSPACE/third_party/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Compile key JVM modules
        run: ./gradlew :sqlcipher-multiplatform-jdbc-core:compileKotlin :sqlcipher-multiplatform:compileKotlinJvm --stacktrace

      - name: Build Windows native bridge and artifact module
        run: >-
          ./gradlew
          :native-bridge:buildNative
          :native-bridge:copyRuntimeDependencies
          :native-artifacts:sqlcipher-multiplatform-jdbc-windows-x64:processResources
          :native-artifacts:sqlcipher-multiplatform-jdbc-windows-x64:jar
          "-Pnative.buildType=${{ inputs.native-build-type }}"
          "-Pnative.lib.basename=${{ inputs.native-lib-basename }}"
          --stacktrace

      - name: Assert expected Windows JNI payload exists
        shell: pwsh
        run: |
          $outRoot = Join-Path $env:GITHUB_WORKSPACE "native-bridge/build/cmake/out"
          $expectedDir = Join-Path $outRoot "${{ inputs.native-build-type }}"
          $expectedPath = Join-Path $expectedDir "${{ inputs.native-lib-basename }}.dll"

          if (!(Test-Path -LiteralPath $expectedPath)) {
            $found = Get-ChildItem -Path $outRoot -Filter "${{ inputs.native-lib-basename }}.dll" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($null -ne $found) {
              New-Item -ItemType Directory -Path $expectedDir -Force | Out-Null
              Copy-Item -LiteralPath $found.FullName -Destination $expectedPath -Force
              Write-Host "Normalized JNI library location: $($found.FullName) -> $expectedPath"
            }
          }

          if (!(Test-Path -LiteralPath $expectedPath)) {
            Write-Host "Expected JNI library missing at: $expectedPath"
            Write-Host "Discovered output tree for diagnostics:"
            if (Test-Path -LiteralPath $outRoot) {
              Get-ChildItem -Path $outRoot -Recurse -File | Select-Object FullName,Length
            }
            Write-Error "Expected JNI library not found after native build: $expectedPath"
          } else {
            Write-Host "Found JNI library: $expectedPath"
          }

      - name: Verify samples
        if: ${{ inputs.run-verify-samples }}
        run: ./gradlew verifySamples "-Pnative.buildType=${{ inputs.native-build-type }}" --stacktrace --info

      - name: Run native artifact guardrails
        if: ${{ inputs.run-native-smoke-test }}
        run: >-
          ./gradlew
          :native-artifacts:sqlcipher-multiplatform-jdbc-windows-x64:verifyNativeArtifactGuardrails
          "-Pnative.windowsPayloadDir=native-bridge/build/cmake/out/${{ inputs.native-build-type }}"
          "-Pnative.buildType=${{ inputs.native-build-type }}"
          "-Pnative.lib.basename=${{ inputs.native-lib-basename }}"
          --stacktrace

      - name: Publish dry-run to Maven local
        if: ${{ inputs.run-publish-to-maven-local }}
        run: >-
          ./gradlew
          publishToMavenLocal
          -Psqlcipher.useLocalJdbcPlatforms=false
          -Psqlcipher.includeAllNativePlatforms=true
          --stacktrace

      - name: Upload Windows native payload
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-prefix }}-payload
          path: native-bridge/build/cmake/out/${{ inputs.native-build-type }}/*.dll
          if-no-files-found: error

      - name: Upload Windows native artifact JAR
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-prefix }}-jar
          path: native-artifacts/sqlcipher-multiplatform-jdbc-windows-x64/build/libs/*.jar
          if-no-files-found: error

      - name: Upload Gradle test reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-prefix }}-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: ignore

      - name: Dump native output folders on failure
        if: ${{ failure() }}
        shell: pwsh
        run: |
          Write-Host "native-bridge/build/cmake/out tree:"
          if (Test-Path "$env:GITHUB_WORKSPACE/native-bridge/build/cmake/out") {
            Get-ChildItem -Path "$env:GITHUB_WORKSPACE/native-bridge/build/cmake/out" -Recurse -Force | Select-Object FullName,Length
          } else {
            Write-Host "(missing) $env:GITHUB_WORKSPACE/native-bridge/build/cmake/out"
          }

          Write-Host "windows artifact resources tree:"
          if (Test-Path "$env:GITHUB_WORKSPACE/native-artifacts/sqlcipher-multiplatform-jdbc-windows-x64/build/resources/main/META-INF/sqlcipher/native/windows-x64") {
            Get-ChildItem -Path "$env:GITHUB_WORKSPACE/native-artifacts/sqlcipher-multiplatform-jdbc-windows-x64/build/resources/main/META-INF/sqlcipher/native/windows-x64" -Recurse -Force | Select-Object FullName,Length
          } else {
            Write-Host "(missing) $env:GITHUB_WORKSPACE/native-artifacts/sqlcipher-multiplatform-jdbc-windows-x64/build/resources/main/META-INF/sqlcipher/native/windows-x64"
          }
