name: _windows-native-build

"on":
  workflow_call:
    inputs:
      native-build-type:
        description: Native bridge build type
        required: false
        type: string
        default: Release
      native-lib-basename:
        description: Native JNI library basename (without platform prefix/suffix)
        required: false
        type: string
        default: sqlcipher_jni
      run-verify-samples:
        description: Run verifySamples task
        required: false
        type: boolean
        default: false
      run-native-smoke-test:
        description: Run native artifact guardrails (payload verification + shared jdbc-core integration tests)
        required: false
        type: boolean
        default: false
      run-publish-to-maven-local:
        description: Run publishToMavenLocal as a consumer smoke check
        required: false
        type: boolean
        default: false
      run-publish-to-maven-central:
        description: Publish Windows native JDBC artifact to Maven Central
        required: false
        type: boolean
        default: false
      upload-artifacts:
        description: Upload built Windows native payload/JAR artifacts
        required: false
        type: boolean
        default: true
      artifact-prefix:
        description: Prefix used for uploaded artifact names
        required: false
        type: string
        default: windows-native

jobs:
  build:
    name: Windows build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Conan 2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install conan
          conan profile detect --force

      - name: Compile key JVM modules
        run: ./gradlew :sqlcipher-multiplatform-jdbc-core:compileKotlin :sqlcipher-multiplatform:compileKotlinJvm --stacktrace

      - name: Build Windows native bridge and artifact module
        run: >-
          ./gradlew
          :native-bridge:buildNative
          :native-artifacts:sqlcipher-multiplatform-jdbc-windows-x64:processResources
          :native-artifacts:sqlcipher-multiplatform-jdbc-windows-x64:jar
          "-Pnative.buildType=${{ inputs.native-build-type }}"
          "-Pnative.lib.basename=${{ inputs.native-lib-basename }}"
          --stacktrace
          
      - name: Verify Windows native artifact guardrails
        if: ${{ inputs.run-native-smoke-test }}
        run: >-
          ./gradlew
          :native-artifacts:sqlcipher-multiplatform-jdbc-windows-x64:verifyNativeArtifactGuardrails
          "-Pnative.buildType=${{ inputs.native-build-type }}"
          "-Pnative.lib.basename=${{ inputs.native-lib-basename }}"
          --stacktrace

      - name: Publish to Maven Local
        if: ${{ inputs.run-publish-to-maven-local }}
        run: >-
          ./gradlew
          :native-artifacts:sqlcipher-multiplatform-jdbc-windows-x64:publishToMavenLocal
          "-Pnative.buildType=${{ inputs.native-build-type }}"
          "-Pnative.lib.basename=${{ inputs.native-lib-basename }}"
          --stacktrace

      - name: Verify samples
        if: ${{ inputs.run-verify-samples }}
        run: >-
          ./gradlew
          verifySamples
          "-Pnative.target.os=windows"
          "-Pnative.target.arch=x64"
          "-Pnative.buildType=${{ inputs.native-build-type }}"
          "-Pnative.lib.basename=${{ inputs.native-lib-basename }}"
          --stacktrace

      - name: Publish windows-x64 artifact to Maven Central
        if: ${{ inputs.run-publish-to-maven-central }}
        shell: pwsh
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_SONATYPE_CLOSE_TIMEOUT_SECONDS: "1800"
        run: |
          $versionArg = ""
          if ($env:GITHUB_REF -like "refs/tags/v*" -or $env:GITHUB_REF_NAME -like "v*") {
            $versionArg = "-PreleaseVersion=$($env:GITHUB_REF_NAME -replace '^v','')"
          }

          $args = @(
            ":native-artifacts:sqlcipher-multiplatform-jdbc-windows-x64:verifyNativeArtifactGuardrails",
            ":native-artifacts:sqlcipher-multiplatform-jdbc-windows-x64:publishAndReleaseToMavenCentral",
            "-Pnative.buildType=${{ inputs.native-build-type }}",
            "-Pnative.lib.basename=${{ inputs.native-lib-basename }}",
            "--stacktrace"
          )

          if ($versionArg) {
            $args = @($versionArg) + $args
          }

          .\gradlew.bat @args

      - name: Upload Windows native artifact JAR
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-prefix }}-jar
          path: native-artifacts/sqlcipher-multiplatform-jdbc-windows-x64/build/libs/*.jar
          if-no-files-found: error

      - name: Upload Gradle test reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-prefix }}-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: ignore

      - name: Dump native output folders on failure
        if: ${{ failure() }}
        shell: pwsh
        run: |
          Write-Host "native-bridge/build/cmake/out tree:"
          if (Test-Path "$env:GITHUB_WORKSPACE/native-bridge/build/cmake/out") {
            Get-ChildItem -Path "$env:GITHUB_WORKSPACE/native-bridge/build/cmake/out" -Recurse -Force | Select-Object FullName,Length
          } else {
            Write-Host "(missing) $env:GITHUB_WORKSPACE/native-bridge/build/cmake/out"
          }

          Write-Host "windows artifact resources tree:"
          if (Test-Path "$env:GITHUB_WORKSPACE/native-artifacts/sqlcipher-multiplatform-jdbc-windows-x64/build/resources/main/META-INF/sqlcipher/native/windows-x64") {
            Get-ChildItem -Path "$env:GITHUB_WORKSPACE/native-artifacts/sqlcipher-multiplatform-jdbc-windows-x64/build/resources/main/META-INF/sqlcipher/native/windows-x64" -Recurse -Force | Select-Object FullName,Length
          } else {
            Write-Host "(missing) $env:GITHUB_WORKSPACE/native-artifacts/sqlcipher-multiplatform-jdbc-windows-x64/build/resources/main/META-INF/sqlcipher/native/windows-x64"
          }
