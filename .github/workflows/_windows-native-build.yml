name: _windows-native-build

"on":
  workflow_call:
    inputs:
      native-build-type:
        description: Native bridge build type
        required: false
        type: string
        default: Release
      run-verify-samples:
        description: Run verifySamples task
        required: false
        type: boolean
        default: false
      run-native-smoke-test:
        description: Run jdbc-sqlcipher-jvm native smoke test
        required: false
        type: boolean
        default: false
      run-publish-to-maven-local:
        description: Run publishToMavenLocal as a consumer smoke check
        required: false
        type: boolean
        default: false
      upload-artifacts:
        description: Upload built Windows native payload/JAR artifacts
        required: false
        type: boolean
        default: true
      artifact-prefix:
        description: Prefix used for uploaded artifact names
        required: false
        type: string
        default: windows-native

jobs:
  build:
    name: Windows build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install OpenSSL via vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "$env:GITHUB_WORKSPACE/third_party/vcpkg")) {
            git clone https://github.com/microsoft/vcpkg "$env:GITHUB_WORKSPACE/third_party/vcpkg"
          }
          & "$env:GITHUB_WORKSPACE/third_party/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          & "$env:GITHUB_WORKSPACE/third_party/vcpkg/vcpkg.exe" install openssl:x64-windows zlib:x64-windows
          "VCPKG_ROOT=$env:GITHUB_WORKSPACE/third_party/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Compile key JVM modules
        run: ./gradlew :jdbc-sqlcipher-jvm:compileKotlin :kmp-api:compileKotlinJvm --stacktrace

      - name: Build Windows native artifact module
        run: ./gradlew :native-artifacts:sqlcipher-native-windows-x64:jar :native-artifacts:sqlcipher-native-windows-x64:verifyWindowsNativePayload "-Pnative.buildType=${{ inputs.native-build-type }}" --stacktrace

      - name: Verify samples
        if: ${{ inputs.run-verify-samples }}
        run: ./gradlew verifySamples "-Pnative.buildType=${{ inputs.native-build-type }}" --stacktrace --info

      - name: Run native smoke test
        if: ${{ inputs.run-native-smoke-test }}
        run: ./gradlew :jdbc-sqlcipher-jvm:nativeSmokeTest "-Pnative.buildType=${{ inputs.native-build-type }}" --stacktrace

      - name: Publish dry-run to Maven local
        if: ${{ inputs.run-publish-to-maven-local }}
        run: ./gradlew publishToMavenLocal --stacktrace

      - name: Upload Windows native payload
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-prefix }}-payload
          path: native-bridge/build/cmake/out/${{ inputs.native-build-type }}/*.dll
          if-no-files-found: error

      - name: Upload Windows native artifact JAR
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-prefix }}-jar
          path: native-artifacts/sqlcipher-native-windows-x64/build/libs/*.jar
          if-no-files-found: error

      - name: Upload Gradle test reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-prefix }}-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: ignore
