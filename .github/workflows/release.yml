name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-native:
    name: Build Windows native artifact
    uses: ./.github/workflows/_windows-native-build.yml
    with:
      native-build-type: Release
      run-verify-samples: false
      run-native-smoke-test: false
      run-publish-to-maven-local: false
      upload-artifacts: true
      artifact-prefix: release-windows-native

  build-linux-native:
    name: Build Linux native artifact (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            vcpkg-triplet: x64-linux
            artifact-prefix: release-linux-x64-native
          - arch: arm64
            runner: ubuntu-24.04-arm
            vcpkg-triplet: arm64-linux
            artifact-prefix: release-linux-arm64-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config curl zip unzip tar

      - name: Install OpenSSL via vcpkg
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/third_party/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$GITHUB_WORKSPACE/third_party/vcpkg"
          fi
          "$GITHUB_WORKSPACE/third_party/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          "$GITHUB_WORKSPACE/third_party/vcpkg/vcpkg" install "openssl:${{ matrix.vcpkg-triplet }}" "zlib:${{ matrix.vcpkg-triplet }}"
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/third_party/vcpkg" >> "$GITHUB_ENV"

      - name: Build Linux native bridge payload
        run: >-
          ./gradlew
          :native-bridge:buildNative
          -Pnative.target.os=linux
          -Pnative.target.arch=${{ matrix.arch }}
          -Pnative.vcpkgTriplet=${{ matrix.vcpkg-triplet }}
          --stacktrace

      - name: Upload Linux native payload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-prefix }}-payload
          path: native-bridge/build/cmake/out/*.so
          if-no-files-found: error

  build-macos-native:
    name: Build macOS native artifact (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-13
            vcpkg-triplet: x64-osx
            artifact-prefix: release-macos-x64-native
          - arch: arm64
            runner: macos-14
            vcpkg-triplet: arm64-osx
            artifact-prefix: release-macos-arm64-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Install OpenSSL via vcpkg
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/third_party/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$GITHUB_WORKSPACE/third_party/vcpkg"
          fi
          "$GITHUB_WORKSPACE/third_party/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          "$GITHUB_WORKSPACE/third_party/vcpkg/vcpkg" install "openssl:${{ matrix.vcpkg-triplet }}" "zlib:${{ matrix.vcpkg-triplet }}"
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/third_party/vcpkg" >> "$GITHUB_ENV"

      - name: Build macOS native bridge payload
        run: >-
          ./gradlew
          :native-bridge:buildNative
          -Pnative.target.os=macos
          -Pnative.target.arch=${{ matrix.arch }}
          -Pnative.vcpkgTriplet=${{ matrix.vcpkg-triplet }}
          --stacktrace

      - name: Upload macOS native payload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-prefix }}-payload
          path: native-bridge/build/cmake/out/*.dylib
          if-no-files-found: error

  bundle-native-payloads:
    name: Bundle native payloads for publish
    runs-on: ubuntu-latest
    needs:
      - build-windows-native
      - build-linux-native
      - build-macos-native
    steps:
      - name: Download Windows native payload
        uses: actions/download-artifact@v4
        with:
          name: release-windows-native-payload
          path: build/native-payloads/windows-x64

      - name: Download Linux x64 native payload
        uses: actions/download-artifact@v4
        with:
          name: release-linux-x64-native-payload
          path: build/native-payloads/linux-x64

      - name: Download Linux arm64 native payload
        uses: actions/download-artifact@v4
        with:
          name: release-linux-arm64-native-payload
          path: build/native-payloads/linux-arm64

      - name: Download macOS x64 native payload
        uses: actions/download-artifact@v4
        with:
          name: release-macos-x64-native-payload
          path: build/native-payloads/macos-x64

      - name: Download macOS arm64 native payload
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64-native-payload
          path: build/native-payloads/macos-arm64

      - name: Validate bundled payload layout
        run: |
          shopt -s nullglob

          windows=(build/native-payloads/windows-x64/*.dll)
          linux_x64=(build/native-payloads/linux-x64/*.so)
          linux_arm64=(build/native-payloads/linux-arm64/*.so)
          macos_x64=(build/native-payloads/macos-x64/*.dylib)
          macos_arm64=(build/native-payloads/macos-arm64/*.dylib)

          test ${#windows[@]} -gt 0
          test ${#linux_x64[@]} -gt 0
          test ${#linux_arm64[@]} -gt 0
          test ${#macos_x64[@]} -gt 0
          test ${#macos_arm64[@]} -gt 0

      - name: Upload bundled native payloads
        run: |
          tar -czf build/release-native-payloads-bundle.tgz -C build native-payloads

      - name: Upload bundled native payloads archive
        uses: actions/upload-artifact@v4
        with:
          name: release-native-payloads-bundle
          path: build/release-native-payloads-bundle.tgz
          if-no-files-found: error

  publish:
    name: Publish signed artifacts to Maven Central
    runs-on: ubuntu-latest
    needs:
      - bundle-native-payloads
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Download bundled native payloads
        uses: actions/download-artifact@v4
        with:
          name: release-native-payloads-bundle
          path: build

      - name: Extract bundled native payloads
        run: |
          tar -xzf build/release-native-payloads-bundle.tgz -C build

      - name: Verify native payload packaging
        run: |
          ./gradlew \
            :native-artifacts:sqlcipher-native-windows-x64:verifyWindowsNativePayload \
            :native-artifacts:sqlcipher-native-linux-x64:verifyLinuxX64NativePayload \
            :native-artifacts:sqlcipher-native-linux-arm64:verifyLinuxArm64NativePayload \
            :native-artifacts:sqlcipher-native-macos-x64:verifyMacosX64NativePayload \
            :native-artifacts:sqlcipher-native-macos-arm64:verifyMacosArm64NativePayload \
            -Pnative.windowsPayloadDir=build/native-payloads/windows-x64 \
            -Pnative.linuxX64PayloadDir=build/native-payloads/linux-x64 \
            -Pnative.linuxArm64PayloadDir=build/native-payloads/linux-arm64 \
            -Pnative.macosX64PayloadDir=build/native-payloads/macos-x64 \
            -Pnative.macosArm64PayloadDir=build/native-payloads/macos-arm64 \
            --stacktrace

      - name: Publish all modules
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          VERSION_ARG=""
          if [[ "${GITHUB_REF}" == refs/tags/v* || "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION_ARG="-PreleaseVersion=${GITHUB_REF_NAME#v}"
          fi

          ./gradlew publish \
            ${VERSION_ARG} \
            -Pnative.windowsPayloadDir=build/native-payloads/windows-x64 \
            -Pnative.linuxX64PayloadDir=build/native-payloads/linux-x64 \
            -Pnative.linuxArm64PayloadDir=build/native-payloads/linux-arm64 \
            -Pnative.macosX64PayloadDir=build/native-payloads/macos-x64 \
            -Pnative.macosArm64PayloadDir=build/native-payloads/macos-arm64 \
            --stacktrace
