name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-native:
    name: Build Windows native artifact
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Windows native payload
        run: ./gradlew :native-bridge:buildNative -Pnative.target.os=windows -Pnative.target.arch=x64

      - name: Package Windows native artifact JAR
        run: ./gradlew :native-artifacts:sqlcipher-native-windows-x64:jar

      - name: Upload Windows payload
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-payload
          path: native-bridge/build/cmake/out/Release/*.dll

  build-linux-native:
    name: Build Linux native artifact (stub for now)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Linux artifact modules
        run: ./gradlew :native-artifacts:sqlcipher-native-linux-x64:jar :native-artifacts:sqlcipher-native-linux-arm64:jar

  build-macos-native:
    name: Build macOS native artifact (stub for now)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build macOS artifact modules
        run: ./gradlew :native-artifacts:sqlcipher-native-macos-x64:jar :native-artifacts:sqlcipher-native-macos-arm64:jar

  publish:
    name: Publish signed artifacts to Maven Central
    runs-on: ubuntu-latest
    needs:
      - build-windows-native
      - build-linux-native
      - build-macos-native
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Windows native payload
        uses: actions/download-artifact@v4
        with:
          name: windows-native-payload
          path: build/windows-native-payload

      - name: Publish all modules
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: >-
          ./gradlew publish
          -Pnative.windowsPayloadDir=build/windows-native-payload
