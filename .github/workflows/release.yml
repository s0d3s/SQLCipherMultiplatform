name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-native:
    name: Build Windows native artifact
    uses: ./.github/workflows/_windows-native-build.yml
    with:
      native-build-type: Release
      run-verify-samples: false
      run-native-smoke-test: false
      run-publish-to-maven-local: false
      upload-artifacts: true
      artifact-prefix: release-windows-native

  build-stub-native-jars:
    name: Build stub native artifact jars (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            os: ubuntu-latest
            gradle_tasks: ":native-artifacts:sqlcipher-native-linux-x64:jar :native-artifacts:sqlcipher-native-linux-arm64:jar"
            artifact_name: release-linux-native-jars
            artifact_glob: "native-artifacts/sqlcipher-native-linux-*/build/libs/*.jar"
          - label: macos
            os: macos-latest
            gradle_tasks: ":native-artifacts:sqlcipher-native-macos-x64:jar :native-artifacts:sqlcipher-native-macos-arm64:jar"
            artifact_name: release-macos-native-jars
            artifact_glob: "native-artifacts/sqlcipher-native-macos-*/build/libs/*.jar"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build stub artifact modules
        run: ./gradlew ${{ matrix.gradle_tasks }} --stacktrace

      - name: Upload stub native artifact jars
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish:
    name: Publish signed artifacts to Maven Central
    runs-on: ubuntu-latest
    needs:
      - build-windows-native
      - build-stub-native-jars
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Windows native payload
        uses: actions/download-artifact@v4
        with:
          name: release-windows-native-payload
          path: build/windows-native-payload

      - name: Publish all modules
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          VERSION_ARG=""
          if [[ "${GITHUB_REF}" == refs/tags/v* || "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION_ARG="-PreleaseVersion=${GITHUB_REF_NAME#v}"
          fi

          ./gradlew publish \
            ${VERSION_ARG} \
            -Pnative.windowsPayloadDir=build/windows-native-payload
