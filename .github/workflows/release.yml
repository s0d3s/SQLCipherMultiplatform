name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  RELEASE_ENABLE_WINDOWS_X64: "true"
  RELEASE_ENABLE_LINUX_X64: "false"
  RELEASE_ENABLE_LINUX_ARM64: "false"
  RELEASE_ENABLE_MACOS_X64: "false"
  RELEASE_ENABLE_MACOS_ARM64: "false"

jobs:
  resolve-release-targets:
    name: Resolve enabled release targets
    runs-on: ubuntu-latest
    outputs:
      enable_windows_x64: ${{ steps.flags.outputs.enable_windows_x64 }}
      enable_linux_x64: ${{ steps.flags.outputs.enable_linux_x64 }}
      enable_linux_arm64: ${{ steps.flags.outputs.enable_linux_arm64 }}
      enable_macos_x64: ${{ steps.flags.outputs.enable_macos_x64 }}
      enable_macos_arm64: ${{ steps.flags.outputs.enable_macos_arm64 }}
    steps:
      - name: Resolve target flags from workflow env
        id: flags
        run: |
          echo "enable_windows_x64=${RELEASE_ENABLE_WINDOWS_X64}" >> "$GITHUB_OUTPUT"
          echo "enable_linux_x64=${RELEASE_ENABLE_LINUX_X64}" >> "$GITHUB_OUTPUT"
          echo "enable_linux_arm64=${RELEASE_ENABLE_LINUX_ARM64}" >> "$GITHUB_OUTPUT"
          echo "enable_macos_x64=${RELEASE_ENABLE_MACOS_X64}" >> "$GITHUB_OUTPUT"
          echo "enable_macos_arm64=${RELEASE_ENABLE_MACOS_ARM64}" >> "$GITHUB_OUTPUT"

  build-windows-native:
    name: Build Windows native artifact
    needs: [resolve-release-targets]
    if: ${{ needs.resolve-release-targets.outputs.enable_windows_x64 == 'true' }}
    uses: ./.github/workflows/_windows-native-build.yml
    with:
      native-build-type: Release
      run-verify-samples: false
      run-native-smoke-test: false
      run-publish-to-maven-local: false
      upload-artifacts: true
      artifact-prefix: release-windows-native

  build-linux-x64-native:
    name: Build Linux native artifact (x64)
    needs: [resolve-release-targets]
    if: ${{ needs.resolve-release-targets.outputs.enable_linux_x64 == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config curl zip unzip tar

      - name: Install OpenSSL via vcpkg
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/third_party/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$GITHUB_WORKSPACE/third_party/vcpkg"
          fi
          "$GITHUB_WORKSPACE/third_party/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          "$GITHUB_WORKSPACE/third_party/vcpkg/vcpkg" install "openssl:x64-linux" "zlib:x64-linux"
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/third_party/vcpkg" >> "$GITHUB_ENV"

      - name: Build Linux native bridge payload
        run: >-
          ./gradlew
          :native-bridge:buildNative
          -Pnative.target.os=linux
          -Pnative.target.arch=x64
          -Pnative.vcpkgTriplet=x64-linux
          --stacktrace

      - name: Build Linux x64 native artifact JAR
        run: >-
          ./gradlew
          :native-artifacts:sqlcipher-multiplatform-jdbc-linux-x64:jar
          -Pnative.linuxX64PayloadDir=native-bridge/build/cmake/out
          --stacktrace

      - name: Verify Linux x64 native artifact guardrails
        run: >-
          ./gradlew
          :native-artifacts:sqlcipher-multiplatform-jdbc-linux-x64:verifyNativeArtifactGuardrails
          -Pnative.linuxX64PayloadDir=native-bridge/build/cmake/out
          --stacktrace

      - name: Upload Linux native payload
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64-native-payload
          path: native-bridge/build/cmake/out/*.so
          if-no-files-found: error

      - name: Upload Linux x64 native artifact JAR
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64-native-jar
          path: native-artifacts/sqlcipher-multiplatform-jdbc-linux-x64/build/libs/*.jar
          if-no-files-found: error

  build-linux-arm64-native:
    name: Build Linux native artifact (arm64)
    needs: [resolve-release-targets]
    if: ${{ needs.resolve-release-targets.outputs.enable_linux_arm64 == 'true' }}
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Install OpenSSL via vcpkg
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/third_party/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$GITHUB_WORKSPACE/third_party/vcpkg"
          fi
          "$GITHUB_WORKSPACE/third_party/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          "$GITHUB_WORKSPACE/third_party/vcpkg/vcpkg" install "openssl:arm64-linux" "zlib:arm64-linux"
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/third_party/vcpkg" >> "$GITHUB_ENV"

      - name: Build Linux arm64 native bridge payload
        run: >-
          ./gradlew
          :native-bridge:buildNative
          -Pnative.target.os=linux
          -Pnative.target.arch=arm64
          -Pnative.vcpkgTriplet=arm64-linux
          --stacktrace

      - name: Build Linux arm64 native artifact JAR
        run: >-
          ./gradlew
          :native-artifacts:sqlcipher-multiplatform-jdbc-linux-arm64:jar
          -Pnative.linuxArm64PayloadDir=native-bridge/build/cmake/out
          --stacktrace

      - name: Verify Linux arm64 native artifact guardrails
        run: >-
          ./gradlew
          :native-artifacts:sqlcipher-multiplatform-jdbc-linux-arm64:verifyNativeArtifactGuardrails
          -Pnative.linuxArm64PayloadDir=native-bridge/build/cmake/out
          --stacktrace

      - name: Upload Linux arm64 native payload
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-arm64-native-payload
          path: native-bridge/build/cmake/out/*.so
          if-no-files-found: error

      - name: Upload Linux arm64 native artifact JAR
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-arm64-native-jar
          path: native-artifacts/sqlcipher-multiplatform-jdbc-linux-arm64/build/libs/*.jar
          if-no-files-found: error

  build-macos-x64-native:
    name: Build macOS native artifact (x64)
    needs: [resolve-release-targets]
    if: ${{ needs.resolve-release-targets.outputs.enable_macos_x64 == 'true' }}
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Install OpenSSL via vcpkg
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/third_party/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$GITHUB_WORKSPACE/third_party/vcpkg"
          fi
          "$GITHUB_WORKSPACE/third_party/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          "$GITHUB_WORKSPACE/third_party/vcpkg/vcpkg" install "openssl:x64-osx" "zlib:x64-osx"
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/third_party/vcpkg" >> "$GITHUB_ENV"

      - name: Build macOS x64 native bridge payload
        run: >-
          ./gradlew
          :native-bridge:buildNative
          -Pnative.target.os=macos
          -Pnative.target.arch=x64
          -Pnative.vcpkgTriplet=x64-osx
          --stacktrace

      - name: Build macOS x64 native artifact JAR
        run: >-
          ./gradlew
          :native-artifacts:sqlcipher-multiplatform-jdbc-macos-x64:jar
          -Pnative.macosX64PayloadDir=native-bridge/build/cmake/out
          --stacktrace

      - name: Verify macOS x64 native artifact guardrails
        run: >-
          ./gradlew
          :native-artifacts:sqlcipher-multiplatform-jdbc-macos-x64:verifyNativeArtifactGuardrails
          -Pnative.macosX64PayloadDir=native-bridge/build/cmake/out
          --stacktrace

      - name: Upload macOS x64 native payload
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64-native-payload
          path: native-bridge/build/cmake/out/*.dylib
          if-no-files-found: error

      - name: Upload macOS x64 native artifact JAR
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64-native-jar
          path: native-artifacts/sqlcipher-multiplatform-jdbc-macos-x64/build/libs/*.jar
          if-no-files-found: error

  build-macos-arm64-native:
    name: Build macOS native artifact (arm64)
    needs: [resolve-release-targets]
    if: ${{ needs.resolve-release-targets.outputs.enable_macos_arm64 == 'true' }}
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Install OpenSSL via vcpkg
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/third_party/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$GITHUB_WORKSPACE/third_party/vcpkg"
          fi
          "$GITHUB_WORKSPACE/third_party/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          "$GITHUB_WORKSPACE/third_party/vcpkg/vcpkg" install "openssl:arm64-osx" "zlib:arm64-osx"
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/third_party/vcpkg" >> "$GITHUB_ENV"

      - name: Build macOS arm64 native bridge payload
        run: >-
          ./gradlew
          :native-bridge:buildNative
          -Pnative.target.os=macos
          -Pnative.target.arch=arm64
          -Pnative.vcpkgTriplet=arm64-osx
          --stacktrace

      - name: Build macOS arm64 native artifact JAR
        run: >-
          ./gradlew
          :native-artifacts:sqlcipher-multiplatform-jdbc-macos-arm64:jar
          -Pnative.macosArm64PayloadDir=native-bridge/build/cmake/out
          --stacktrace

      - name: Verify macOS arm64 native artifact guardrails
        run: >-
          ./gradlew
          :native-artifacts:sqlcipher-multiplatform-jdbc-macos-arm64:verifyNativeArtifactGuardrails
          -Pnative.macosArm64PayloadDir=native-bridge/build/cmake/out
          --stacktrace

      - name: Upload macOS arm64 native payload
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64-native-payload
          path: native-bridge/build/cmake/out/*.dylib
          if-no-files-found: error

      - name: Upload macOS arm64 native artifact JAR
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64-native-jar
          path: native-artifacts/sqlcipher-multiplatform-jdbc-macos-arm64/build/libs/*.jar
          if-no-files-found: error

  bundle-native-payloads:
    name: Bundle native payloads for publish
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - resolve-release-targets
      - build-windows-native
      - build-linux-x64-native
      - build-linux-arm64-native
      - build-macos-x64-native
      - build-macos-arm64-native
    env:
      ENABLE_WINDOWS_X64: ${{ needs.resolve-release-targets.outputs.enable_windows_x64 }}
      ENABLE_LINUX_X64: ${{ needs.resolve-release-targets.outputs.enable_linux_x64 }}
      ENABLE_LINUX_ARM64: ${{ needs.resolve-release-targets.outputs.enable_linux_arm64 }}
      ENABLE_MACOS_X64: ${{ needs.resolve-release-targets.outputs.enable_macos_x64 }}
      ENABLE_MACOS_ARM64: ${{ needs.resolve-release-targets.outputs.enable_macos_arm64 }}
    steps:
      - name: Download Windows native payload
        if: ${{ env.ENABLE_WINDOWS_X64 == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: release-windows-native-payload
          path: build/native-payloads/windows-x64

      - name: Download Linux x64 native payload
        if: ${{ env.ENABLE_LINUX_X64 == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: release-linux-x64-native-payload
          path: build/native-payloads/linux-x64

      - name: Download Linux arm64 native payload
        if: ${{ env.ENABLE_LINUX_ARM64 == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: release-linux-arm64-native-payload
          path: build/native-payloads/linux-arm64

      - name: Download macOS x64 native payload
        if: ${{ env.ENABLE_MACOS_X64 == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: release-macos-x64-native-payload
          path: build/native-payloads/macos-x64

      - name: Download macOS arm64 native payload
        if: ${{ env.ENABLE_MACOS_ARM64 == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64-native-payload
          path: build/native-payloads/macos-arm64

      - name: Generate bundle manifest
        run: |
          mkdir -p build/native-payloads
          : > build/native-payloads/targets.txt

          [[ "$ENABLE_WINDOWS_X64" == "true" ]] && echo "windows-x64" >> build/native-payloads/targets.txt
          [[ "$ENABLE_LINUX_X64" == "true" ]] && echo "linux-x64" >> build/native-payloads/targets.txt
          [[ "$ENABLE_LINUX_ARM64" == "true" ]] && echo "linux-arm64" >> build/native-payloads/targets.txt
          [[ "$ENABLE_MACOS_X64" == "true" ]] && echo "macos-x64" >> build/native-payloads/targets.txt
          [[ "$ENABLE_MACOS_ARM64" == "true" ]] && echo "macos-arm64" >> build/native-payloads/targets.txt

          if [[ ! -s build/native-payloads/targets.txt ]]; then
            echo "No native targets selected for release bundle" >&2
            exit 1
          fi

      - name: Validate bundled payload layout
        run: |
          shopt -s nullglob

          while IFS= read -r target; do
            case "$target" in
              windows-x64)
                files=(build/native-payloads/windows-x64/*.dll)
                ;;
              linux-x64)
                files=(build/native-payloads/linux-x64/*.so)
                ;;
              linux-arm64)
                files=(build/native-payloads/linux-arm64/*.so)
                ;;
              macos-x64)
                files=(build/native-payloads/macos-x64/*.dylib)
                ;;
              macos-arm64)
                files=(build/native-payloads/macos-arm64/*.dylib)
                ;;
              *)
                echo "Unknown target in bundle manifest: $target" >&2
                exit 1
                ;;
            esac

            if [[ ${#files[@]} -eq 0 ]]; then
              echo "No native payload files found for target: $target" >&2
              exit 1
            fi
          done < build/native-payloads/targets.txt

      - name: Upload bundled native payloads
        run: |
          tar -czf build/release-native-payloads-bundle.tgz -C build native-payloads

      - name: Upload bundled native payloads archive
        uses: actions/upload-artifact@v4
        with:
          name: release-native-payloads-bundle
          path: build/release-native-payloads-bundle.tgz
          if-no-files-found: error

  publish:
    name: Publish signed artifacts to Maven Central
    runs-on: ubuntu-latest
    needs:
      - bundle-native-payloads
    if: ${{ always() && needs.bundle-native-payloads.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Download bundled native payloads
        uses: actions/download-artifact@v4
        with:
          name: release-native-payloads-bundle
          path: build

      - name: Extract bundled native payloads
        run: |
          tar -xzf build/release-native-payloads-bundle.tgz -C build

      - name: Resolve publish targets
        id: target_args
        run: |
          enabled_targets_csv=$(paste -sd, build/native-payloads/targets.txt)
          echo "enabled_targets_csv=$enabled_targets_csv" >> "$GITHUB_OUTPUT"

          payload_props=()

          while IFS= read -r target; do
            case "$target" in
              windows-x64)
                payload_props+=("-Pnative.windowsPayloadDir=build/native-payloads/windows-x64")
                ;;
              linux-x64)
                payload_props+=("-Pnative.linuxX64PayloadDir=build/native-payloads/linux-x64")
                ;;
              linux-arm64)
                payload_props+=("-Pnative.linuxArm64PayloadDir=build/native-payloads/linux-arm64")
                ;;
              macos-x64)
                payload_props+=("-Pnative.macosX64PayloadDir=build/native-payloads/macos-x64")
                ;;
              macos-arm64)
                payload_props+=("-Pnative.macosArm64PayloadDir=build/native-payloads/macos-arm64")
                ;;
            esac
          done < build/native-payloads/targets.txt

          echo "payload_props=${payload_props[*]}" >> "$GITHUB_OUTPUT"

      - name: Verify native payload packaging
        run: |
          ./gradlew \
            verifyNativeArtifactsGuardrails \
            :sqlcipher-multiplatform:verifyPublishedNativeArtifacts \
            -Pnative.enabledTargets=${{ steps.target_args.outputs.enabled_targets_csv }} \
            -Psqlcipher.useLocalJdbcPlatforms=false \
            -Psqlcipher.includeAllNativePlatforms=true \
            ${{ steps.target_args.outputs.payload_props }} \
            --stacktrace

      - name: Publish all modules
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          VERSION_ARG=""
          if [[ "${GITHUB_REF}" == refs/tags/v* || "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION_ARG="-PreleaseVersion=${GITHUB_REF_NAME#v}"
          fi

          ./gradlew publish \
            ${VERSION_ARG} \
            -Pnative.enabledTargets=${{ steps.target_args.outputs.enabled_targets_csv }} \
            -Psqlcipher.useLocalJdbcPlatforms=false \
            -Psqlcipher.includeAllNativePlatforms=true \
            ${{ steps.target_args.outputs.payload_props }} \
            --stacktrace
